<!DOCTYPE html><html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OMNIA — Structural Truth Demo</title>
<style>
:root{--bg:#0b0f14;--panel:#121922;--text:#e8eef5;--muted:#9aa7b5;--accent:#7cc4ff;--good:#57d38c;--bad:#ff6b6b;--line:#223041}
body{margin:0;background:#0b0f14;color:var(--text);font-family:Arial}
.wrap{width:min(1100px,94vw);margin:40px auto}
.title{font-size:34px;font-weight:900}
.subtitle{color:var(--muted);margin:10px 0 25px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px}
textarea{width:100%;min-height:120px;background:#0a1017;color:#fff;border:1px solid var(--line);border-radius:12px;padding:10px}
.row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
button{padding:10px 14px;border-radius:10px;border:1px solid var(--line);background:#0d141c;color:#fff;cursor:pointer}
.metric{display:inline-block;margin-right:20px;font-weight:700}
canvas{width:100%;height:220px;background:#091018;border:1px solid var(--line);border-radius:12px}
.verdict{font-size:20px;font-weight:900}
.good{color:var(--good)}
.bad{color:var(--bad)}
</style>
</head>
<body>
<div class="wrap">
<div class="title">OMNIA</div>
<div class="subtitle">Which structure survives transformation?</div><div class="panel">
<textarea id="a">SATORAREPOTENETOPERAROTAS</textarea>
<textarea id="b">asdjklqweoiu1239123zxcmn</textarea>
<div class="row">
<button onclick="run()">TEST</button>
<button onclick="preset1()">SATOR vs RANDOM</button>
<button onclick="preset2()">PRIMES vs NOISE</button>
</div>
</div><div class="panel">
<div id="verdict" class="verdict">Press TEST</div>
</div><div class="panel">
<div class="metric">Ω A: <span id="oa"></span></div>
<div class="metric">Ω B: <span id="ob"></span></div>
<div class="metric">TΔ A: <span id="ta"></span></div>
<div class="metric">TΔ B: <span id="tb"></span></div>
</div><div class="panel">
<canvas id="c"></canvas>
</div></div><script>
function rnd(s){return s.split('').sort(()=>Math.random()-0.5).join('')}
function noise(s,l=0.2){return s.split('').map(ch=>Math.random()<l?String.fromCharCode(32+Math.random()*95):ch).join('')}
function dist(s){let m={};for(let c of s)m[c]=(m[c]||0)+1;let t=s.length;for(let k in m)m[k]/=t;return m}
function d(a,b){let k=new Set([...Object.keys(a),...Object.keys(b)]);let s=0;for(let x of k)s+=Math.abs((a[x]||0)-(b[x]||0));return s}
function omega(a,b){return 1-0.5*d(dist(a),dist(b))}
function tdelta(s){let o=s;for(let i=1;i<20;i++){let n=noise(s,i/20);if(omega(o,n)<0.5)return i;o=n}return 20}

function run(){
let a=document.getElementById('a').value
let b=document.getElementById('b').value
let oa=omega(a,rnd(a))
let ob=omega(b,rnd(b))
let ta=tdelta(a)
let tb=tdelta(b)

document.getElementById('oa').innerText=oa.toFixed(3)
document.getElementById('ob').innerText=ob.toFixed(3)
document.getElementById('ta').innerText=ta
document.getElementById('tb').innerText=tb

let verdict=document.getElementById('verdict')
if(oa>ob && ta>tb) verdict.innerHTML='<span class="good">A stronger</span>'
else if(ob>oa && tb>ta) verdict.innerHTML='<span class="good">B stronger</span>'
else verdict.innerHTML='Mixed result'

draw(a,b)
}

function draw(a,b){
let c=document.getElementById('c')
let ctx=c.getContext('2d')
ctx.clearRect(0,0,c.width,c.height)
for(let i=0;i<20;i++){
let va=omega(a,noise(a,i/20))
let vb=omega(b,noise(b,i/20))
ctx.fillStyle='#57d38c'
ctx.fillRect(i*20,200-va*180,5,5)
ctx.fillStyle='#ff6b6b'
ctx.fillRect(i*20+8,200-vb*180,5,5)
}
}

function preset1(){
document.getElementById('a').value='SATORAREPOTENETOPERAROTAS'
document.getElementById('b').value='asdjklqweoiu1239123zxcmn'
run()
}

function preset2(){
document.getElementById('a').value='2357111317192329'
document.getElementById('b').value='93847561029384'
run()
}
</script></body>
</html>
